<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Website</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="restaraunt">
        <h1 class="restaraunt__name">
            Reestar
        </h1>
        <p class="restaraunt__desc">
            Home | Recepie | Contact
        </p>
    </div>
    <div class="Dishes-container">

        <div class="card">
            <img src="ramen-2-768x1024.jpg" alt="Ramen Spicy Noodles">
            <h3>Ramen Spicy Noodles</h3>
            <p>Starter: The best !</p>
            <button class="order-button">ORDER NOW</button>
        </div>

        <div class="card">
            <img src="chicken.jpg" alt="Creamy Butter Chicken">
            <h3>Creamy Butter Chicken</h3>
            <p>Main course: Golden rated </p>
            <button class="order-button">ORDER NOW</button>
        </div>


        <div class="card">
            <img src="glass-ice-cream-19743675.webp" alt="Ice cream">
            <h3>Scoop of Icecream</h3>
            <p>Desert: Must try desert. Just wow !</p>
            <button class="order-button">ORDER NOW</button>
        </div>

        <div class="card">
            <img src="pexels-isabella-mendes-107313-338713.jpg" alt="orange juice">
            <h3>Orange Mojito</h3>
            <p>Beverage: A perfect finisher !</p>
            <button class="order-button">ORDER NOW</button>
        </div>

    </div>
    <div class="ordering-section">
        <h1> Contact us </h1>
        <form class="contact-form">
            <div class="form-group">
                <label>Name :</label>
                <input type="text" Name placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Age :</label>
                <input type="number" Age placeholder="Enter your Age">
            </div>
            <div class="form-group">
                <label>E-mail :</label>
                <input type="email" E-mail placeholder="Enter your E-mail">
            </div>
            <button type="submit" class="send-button">Send</button>
        </form>
    </div>




</body>


</html>
